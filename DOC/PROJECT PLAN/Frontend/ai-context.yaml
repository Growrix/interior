frontend_invariants:
  - Shared Contracts own routes, roles, lifecycle states, and integration truth.
  - Mobile must feel app-like and touch-first; it is not a scaled-down desktop layout.
  - Desktop navigation is text-forward; mobile may become icon-assisted where recognition speed matters.
  - Icons on mobile must keep text labels for primary navigation and high-risk actions.
  - Public routes must not repeat identical hero, proof, and CTA structure across pages.
  - Every route family must define loading, empty, error, recovery, and permission behavior where relevant.
  - Design values belong in the token system and component registry, not route-level improvisation.
route_families:
  - public-discovery
  - public-detail
  - public-content-commerce
  - auth-entry
  - client-app
  - designer-app
  - admin-governance
backend_dependency_hotspots:
  - auth and verification gating
  - search and filter data quality
  - inquiry, booking, and messaging state transitions
  - review eligibility and moderation gates
  - commerce model and checkout behavior
  - AI assistant grounding and escalation rules
