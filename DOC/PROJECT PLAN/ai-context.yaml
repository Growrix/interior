version: 1
document_set: project-plan-root
project:
  name: Interior Design Platform
  type: multi-sided discovery, portfolio, booking, content, commerce, and AI-assisted web platform
  status: frontend-planning-locked
  source_of_truth:
    original_business_intent: DOC/MASTER PLAN/Plan.md
    current_phase_truth: DOC/PROJECT PLAN/Frontend/
summary: >-
  Root AI entrypoint for the project-specific planning layer. This project is a
  responsive, image-forward platform where interior designers showcase work and
  potential clients discover, evaluate, contact, and book them, with supporting
  content, events, commerce, and AI assistance.
read_order:
  - DOC/PROJECT PLAN/README.md
  - DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
  - DOC/PROJECT PLAN/Shared Contracts/README.md
  - DOC/PROJECT PLAN/Shared Contracts/product-requirements.md
  - DOC/PROJECT PLAN/Shared Contracts/role-and-access-model.md
  - DOC/PROJECT PLAN/Shared Contracts/route-and-surface-map.md
  - DOC/PROJECT PLAN/Shared Contracts/domain-state-model.md
  - DOC/PROJECT PLAN/Shared Contracts/module-boundaries.md
  - DOC/PROJECT PLAN/Shared Contracts/system-architecture.md
  - DOC/PROJECT PLAN/Shared Contracts/integration-contract-index.md
  - DOC/PROJECT PLAN/Shared Contracts/implementation-sequence.md
  - DOC/PROJECT PLAN/Frontend/ai-context.yaml
  - DOC/PROJECT PLAN/Frontend/README.md
planning_invariants:
  - Shared Contracts govern later frontend, backend, API, security, DevOps, and QA planning.
  - DOC/MASTER PLAN/Plan.md remains the original business-intent source and may not be silently contradicted.
  - Frontend planning must not invent server-backed states, payloads, permissions, or integration behavior.
  - Backend planning must not invent UX-critical states or routes without updating Shared Contracts.
  - Mobile experience must feel app-like, but exact component treatment belongs to the frontend planning phase.
project_surfaces:
  - public-discovery-surface
  - authenticated-client-surface
  - authenticated-designer-surface
  - admin-governance-surface
  - internal-ops-surface-if-needed-later
next_prompts:
  - DOC/Universal/Prompts_Execution/06a_frontend_only_execution_prompt.md
  - DOC/Universal/Prompts_planning/03_backend_system_master_plan_prompt.md
  - DOC/Universal/Prompts_planning/04_api_security_devops_qa_prompt.md
