version: 1
document_set: shared-contracts
folder: DOC/PROJECT PLAN/Shared Contracts
status: source-of-truth-for-specialized-planning
summary: >-
  Shared contract blueprint for the Interior Design Platform. Defines the
  canonical scope, user roles, route inventory, domain entities, lifecycle
  states, integration expectations, non-functional requirements, and delivery
  order before frontend, backend, API, security, DevOps, or QA specialization.
read_order:
  - DOC/PROJECT PLAN/Shared Contracts/README.md
  - DOC/PROJECT PLAN/Shared Contracts/product-requirements.md
  - DOC/PROJECT PLAN/Shared Contracts/role-and-access-model.md
  - DOC/PROJECT PLAN/Shared Contracts/route-and-surface-map.md
  - DOC/PROJECT PLAN/Shared Contracts/domain-state-model.md
  - DOC/PROJECT PLAN/Shared Contracts/module-boundaries.md
  - DOC/PROJECT PLAN/Shared Contracts/system-architecture.md
  - DOC/PROJECT PLAN/Shared Contracts/integration-contract-index.md
  - DOC/PROJECT PLAN/Shared Contracts/implementation-sequence.md
contracts_locked:
  - project scope
  - user roles and planning-level permissions
  - route and surface map
  - domain entities and lifecycle states
  - integration inventory and ownership boundaries
  - non-functional requirements
  - implementation sequence
  - cross-role planning boundaries
invariants:
  - Public, client, designer, admin, and internal surfaces must remain explicitly separated.
  - Responsive web is required; native mobile apps are not part of this phase unless later approved.
  - Mobile UX should feel app-like; exact menu/icon treatment belongs to frontend planning.
  - Reviews, messaging, booking, commerce, and AI features require later security, trust, and QA hardening.
  - If later roles need details not locked here, they must record assumptions instead of inventing facts.
downstream_consumers:
  - Frontend_UIUX_Generator
  - Backend_System_Planner
  - API_Data_Contract_Architect
  - Security_Compliance_Trust_Architect
  - DevOps_Reliability_Release_Planner
  - QA_Test_Release_Governor
